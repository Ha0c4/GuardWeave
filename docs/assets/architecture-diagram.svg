<svg width="1600" height="920" viewBox="0 0 1600 920" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">GuardWeave Architecture Diagram</title>
  <desc id="desc">A layered prompt-injection defense pipeline showing pre-gate checks, prompt wrapping, supported model backends, post verification, and a system-prompt binder cache.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M1 1L11 6L1 11V1Z" fill="#64748b"/>
    </marker>
    <style>
      .title { font: 700 44px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 22px Arial, Helvetica, sans-serif; fill: #334155; }
      .box-title { font: 700 20px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .box-title-inverse { font: 700 20px Arial, Helvetica, sans-serif; fill: #ffffff; }
      .label { font: 400 16px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .small { font: 400 14px Arial, Helvetica, sans-serif; fill: #475569; }
      .legend { font: 400 15px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .accent { fill: #0f766e; }
      .accent-stroke { stroke: #0f766e; }
      .muted-stroke { stroke: #94a3b8; }
      .panel { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.5; }
      .panel-soft { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.5; }
      .pill { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.2; }
      .pill-accent { fill: #0f766e; stroke: #0f766e; stroke-width: 1.2; }
      .connector { stroke: #64748b; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .down-connector { stroke: #94a3b8; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .divider { stroke: #cbd5e1; stroke-width: 1.5; }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="920" fill="#ffffff"/>

  <g transform="translate(555 54)">
    <circle cx="36" cy="36" r="36" fill="#0f766e" opacity="0.12"/>
    <path d="M16 34C16 23 24 16 35 16C43 16 49 20 52 27C55 20 62 16 70 16C81 16 89 23 89 34C89 41 86 46 81 50C76 54 70 58 61 64L53 69C52 70 50 70 49 69L39 62C29 56 23 52 19 47C17 44 16 40 16 34Z" fill="#0f766e"/>
    <text x="108" y="46" class="title">GuardWeave</text>
    <text x="0" y="102" class="subtitle">Prompt-Injection Defense Pipeline</text>
  </g>

  <g transform="translate(56 116)" filter="url(#shadow)">
    <rect x="0" y="0" width="332" height="168" rx="12" class="panel-soft"/>
    <rect x="18" y="18" width="40" height="40" rx="8" fill="#0f766e"/>
    <path d="M28 28H48M28 36H44M28 44H46M28 52H40" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    <text x="80" y="38" class="box-title">System Prompt Binder</text>
    <line x1="80" y1="50" x2="300" y2="50" class="divider"/>
    <text x="48" y="92" class="label">• Regex Generation Cache</text>
    <text x="48" y="128" class="label">• Judge-Derived Regex Profile</text>
    <text x="48" y="164" class="label">• Refresh on Prompt Change</text>
  </g>

  <g transform="translate(418 420)" filter="url(#shadow)">
    <rect x="0" y="0" width="296" height="98" rx="12" class="panel-soft"/>
    <text x="34" y="28" class="box-title">Tiered Defense Injection</text>
    <text x="34" y="58" class="label">• Input Wrapping</text>
    <text x="34" y="88" class="label">• Refusal on High Risk</text>
  </g>

  <g transform="translate(22 620)" filter="url(#shadow)">
    <rect x="0" y="0" width="156" height="72" rx="10" class="panel"/>
    <text x="26" y="45" class="box-title">User Input</text>
  </g>

  <g transform="translate(214 534)" filter="url(#shadow)">
    <rect x="0" y="0" width="212" height="274" rx="12" class="panel"/>
    <rect x="0" y="0" width="212" height="44" rx="12" fill="#0f766e"/>
    <text x="61" y="29" class="box-title-inverse">Pre Gate</text>
    <rect x="14" y="56" width="184" height="38" rx="8" class="pill"/>
    <text x="34" y="81" class="label">Risk Score</text>
    <rect x="14" y="104" width="184" height="38" rx="8" class="pill"/>
    <text x="34" y="129" class="label">Heuristic Checks</text>
    <rect x="14" y="152" width="184" height="38" rx="8" class="pill"/>
    <text x="34" y="177" class="label">Local Judge</text>
    <text x="134" y="177" class="small">(Optional)</text>
    <rect x="14" y="200" width="184" height="38" rx="8" class="pill"/>
    <text x="34" y="225" class="label">Remote Judge</text>
    <text x="149" y="225" class="small">(Optional)</text>
    <rect x="0" y="236" width="212" height="38" rx="0" fill="#0f766e"/>
    <text x="16" y="261" class="box-title-inverse" style="font-size: 16px;">Stage: Pre / Post / Both</text>
  </g>

  <g transform="translate(468 620)" filter="url(#shadow)">
    <rect x="0" y="0" width="188" height="74" rx="10" class="pill-accent"/>
    <text x="21" y="31" class="box-title-inverse">Wrapped Prompt /</text>
    <text x="27" y="58" class="box-title-inverse">Tiered Instruction</text>
  </g>

  <g transform="translate(704 520)" filter="url(#shadow)">
    <rect x="0" y="0" width="334" height="286" rx="14" class="panel"/>
    <text x="32" y="38" class="box-title" style="font-size: 24px;">Wrapped Prompt /</text>
    <text x="40" y="76" class="box-title" style="font-size: 24px;">Tiered Instruction</text>
    <rect x="24" y="94" width="286" height="180" rx="12" fill="#0b3a38"/>
    <rect x="42" y="114" width="250" height="40" rx="8" class="pill-accent"/>
    <text x="110" y="140" class="box-title-inverse">API Services</text>
    <rect x="42" y="160" width="250" height="40" rx="8" class="pill-accent"/>
    <text x="131" y="186" class="box-title-inverse">Local LLM</text>
    <rect x="42" y="206" width="250" height="40" rx="8" class="pill-accent"/>
    <text x="126" y="232" class="box-title-inverse">Custom SDK</text>
    <rect x="42" y="252" width="250" height="40" rx="8" class="pill-accent"/>
    <text x="116" y="278" class="box-title-inverse">Hugging Face</text>
  </g>

  <g transform="translate(1070 534)" filter="url(#shadow)">
    <rect x="0" y="0" width="228" height="278" rx="12" class="panel"/>
    <rect x="0" y="0" width="228" height="44" rx="12" fill="#0f766e"/>
    <text x="55" y="29" class="box-title-inverse">Post Verifier</text>
    <rect x="16" y="58" width="196" height="38" rx="8" class="pill"/>
    <text x="34" y="83" class="label">• Output Heuristics</text>
    <rect x="16" y="104" width="196" height="38" rx="8" class="pill"/>
    <text x="34" y="129" class="label">• Output Judge</text>
    <rect x="16" y="150" width="196" height="38" rx="8" class="pill"/>
    <text x="34" y="175" class="label">• Policy Checks</text>
    <rect x="16" y="196" width="196" height="38" rx="8" class="pill"/>
    <text x="34" y="221" class="label">• Leakage Detection</text>
    <rect x="16" y="238" width="196" height="38" rx="8" class="pill-accent"/>
    <text x="44" y="264" class="box-title-inverse" style="font-size: 18px;">Block / Allow / Refuse</text>
  </g>

  <g transform="translate(1358 620)" filter="url(#shadow)">
    <rect x="0" y="0" width="164" height="72" rx="10" class="panel"/>
    <text x="30" y="45" class="box-title">Final Output</text>
  </g>

  <path d="M180 656H214" class="connector"/>
  <path d="M426 656H468" class="connector"/>
  <path d="M656 656H704" class="connector"/>
  <path d="M1038 656H1070" class="connector"/>
  <path d="M1298 656H1358" class="connector"/>

  <path d="M566 518V590" class="down-connector"/>
  <path d="M508 518V590" class="down-connector"/>
  <path d="M388 206C520 206 560 206 560 404" class="down-connector"/>

  <g transform="translate(46 854)">
    <line x1="0" y1="0" x2="790" y2="0" class="divider"/>
    <text x="0" y="34" class="legend">• Heuristic-Only Path = No Extra Model/API Calls</text>
    <text x="0" y="68" class="legend">• Local Judge = Lightweight Local Classifier</text>
    <text x="0" y="102" class="legend">• Remote Judge = Strongest Blocking (API Latency)</text>
  </g>
</svg>
